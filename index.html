<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#8B4513">
<title>Pesagem de Gado</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1410;height:100vh;overflow:hidden}
.app{max-width:500px;height:100vh;margin:0 auto;background:#f5f1e8;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.hdr{background:linear-gradient(135deg,#8B4513,#654321);color:#d4af37;padding:10px 16px;text-align:center;border-bottom:3px solid #d4af37;flex-shrink:0}
.hdr h1{font-size:20px;font-weight:900}
.hdr-sub{font-size:11px;color:#f4e4c1;display:flex;justify-content:space-around;margin-top:2px}

/* TELA CADASTRO */
.t-cad{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;overflow-y:auto}
.t-cad.off{display:none}
.cad-box{background:white;padding:22px;border-radius:12px;width:100%;max-width:400px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.cad-box h2{color:#8B4513;margin-bottom:16px;font-size:18px;text-align:center}
.campo{margin-bottom:12px}
.campo label{display:block;font-weight:700;color:#654321;margin-bottom:4px;font-size:13px}
.campo input,.campo select{width:100%;padding:10px;border:2px solid #d4af37;border-radius:6px;font-size:15px;color:#654321}
.row{display:flex;gap:8px}
.row input{flex:1}
.row select{width:110px}
.btn-start{width:100%;padding:13px;background:linear-gradient(135deg,#8B4513,#654321);color:#d4af37;border:none;border-radius:6px;font-size:16px;font-weight:700;margin-top:16px;cursor:pointer}

/* TELA PESAGEM */
.t-pes{flex:1;display:flex;flex-direction:column;overflow:hidden}
.t-pes.off{display:none}
.pes-top{padding:12px 14px;flex-shrink:0}

/* DISPLAY */
.display{background:linear-gradient(135deg,#2d1f13,#3d2b1f);border:3px solid #d4af37;border-radius:8px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:flex-end;min-height:70px}
.dval{font-size:46px;font-weight:900;color:#d4af37;font-family:'Courier New',monospace}
.dunit{font-size:15px;color:#f4e4c1;margin-left:6px}

/* QUANTIDADE PICKER */
.qtd-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.qtd-row label{font-weight:700;color:#654321;font-size:13px;width:45px;flex-shrink:0}
.qtd-wrap{flex:1;position:relative;height:44px;overflow:hidden;border:2px solid #d4af37;border-radius:8px;background:white}
.qtd-wrap::before,.qtd-wrap::after{content:'';position:absolute;top:0;bottom:0;width:30px;z-index:2;pointer-events:none}
.qtd-wrap::before{left:0;background:linear-gradient(to right,white,transparent)}
.qtd-wrap::after{right:0;background:linear-gradient(to left,white,transparent)}
.qtd-ind{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:36px;border:2px solid #d4af37;border-radius:6px;z-index:1;pointer-events:none;background:rgba(212,175,55,.1)}
.qtd-track{display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;height:100%;align-items:center}
.qtd-track::-webkit-scrollbar{display:none}
.qtd-item{min-width:44px;height:100%;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;font-size:20px;font-weight:700;color:#654321;cursor:pointer;flex-shrink:0}
.qtd-item.sel{color:#8B4513;background:#fef9ee}

/* CONFIRMAÇÃO */
.conf-box{min-height:0}
.conf-msg{background:#27ae60;color:white;padding:10px 14px;border-radius:6px;text-align:center;font-size:15px;font-weight:700;margin-bottom:10px;animation:sld .3s ease-out}
@keyframes sld{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* TECLADO */
.teclado{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:0}
.key{height:60px;border:2px solid #d4af37;border-radius:8px;font-size:22px;font-weight:700;background:white;color:#654321;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.key:active{background:#d4af37;transform:scale(.95)}
.key.del{background:#e74c3c;color:white;font-size:16px}
.key.del:active{background:#c0392b}
.key.clr{background:#e67e22;color:white;font-size:13px;font-weight:900}
.key.clr:active{background:#d35400}
.key.ok{background:linear-gradient(135deg,#27ae60,#229954);color:white;font-size:26px}
.key.ok:active{background:#1e8449}
.key.prox{background:linear-gradient(135deg,#8B4513,#654321);color:#d4af37;font-size:13px;font-weight:900}
.key.prox:active{background:#5a3a26}

/* SEÇÃO SCROLLÁVEL */
.pes-scroll{flex:1;overflow-y:auto;padding:10px 14px;-webkit-overflow-scrolling:touch}

/* TABELA */
.tabela-wrap{background:white;border-radius:8px;overflow:hidden;margin-bottom:10px;border:2px solid #d4af37}
.tab-header,.tab-row,.tab-total{display:grid;grid-template-columns:28px 40px 68px 72px 80px 30px;align-items:center;padding:7px 4px}
.tab-header{background:linear-gradient(135deg,#8B4513,#654321)}
.tab-header span{color:#d4af37;font-size:9px;font-weight:900;text-transform:uppercase;text-align:center}
.tab-row{border-bottom:1px solid #f0e8d8;animation:sld2 .2s ease-out}
@keyframes sld2{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.tab-row:nth-child(even){background:#fdf9f3}
.tab-row span{font-size:12px;color:#654321;text-align:center;font-weight:600}
.tab-row span.n{color:#8B4513;font-weight:900}
.tab-total{background:linear-gradient(135deg,#2d1f13,#3d2b1f);padding:9px 4px}
.tab-total span{color:#d4af37;font-size:11px;font-weight:900;text-align:center}
.tab-total .tlbl{font-size:10px;grid-column:1/3;text-align:left;padding-left:4px}
.del-btn{background:none;border:none;font-size:13px;cursor:pointer;padding:0;line-height:1}
.tab-empty{color:#bbb;text-align:center;padding:18px;font-size:13px}

/* CARD RESUMO */
.resumo-card{background:linear-gradient(135deg,#2d1f13,#3d2b1f);border-radius:10px;padding:14px;margin-bottom:10px;border:2px solid #d4af37}
.resumo-titulo{color:#d4af37;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;text-align:center}
.resumo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.resumo-item{background:rgba(255,255,255,.07);border-radius:7px;padding:9px 10px;text-align:center}
.resumo-full{grid-column:1/3}
.resumo-label{color:#f4e4c1;font-size:10px;text-transform:uppercase;font-weight:700;margin-bottom:3px}
.resumo-val{color:#d4af37;font-size:18px;font-weight:900}
.resumo-destaque{font-size:22px;color:#f0d060}
/* BOTÕES FINAIS */
.btn-exportar{width:100%;background:linear-gradient(135deg,#1a5c2e,#0f3d1e);color:#fff;border:none;padding:13px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:8px;transition:all .2s}
.btn-exportar:active{transform:scale(.98)}
.btn-finalizar{width:100%;background:linear-gradient(135deg,#8B4513,#654321);color:#d4af37;border:3px solid #d4af37;padding:13px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px;transition:all .2s}
.btn-finalizar:active{transform:scale(.98)}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <h1>🐄 PESAGEM DE GADO</h1>
    <div class="hdr-sub">
      <span id="h-vendedor">—</span>
      <span id="h-preco">—</span>
    </div>
  </div>

  <!-- TELA CADASTRO -->
  <div class="t-cad" id="tCad">
    <div class="cad-box">
      <h2>📋 CADASTRO DO LOTE</h2>
      <div class="campo"><label>Vendedor / Comprador</label><input id="iVendedor" type="text" placeholder="Nome"></div>
      <div class="campo"><label>Preço de Compra (R$ total do lote)</label><input id="iCompra" type="number" placeholder="0.00" step="0.01" min="0"></div>
      <div class="campo">
        <label>Preço de Venda</label>
        <div class="row">
          <input id="iVenda" type="number" placeholder="0.00" step="0.01" min="0">
          <select id="iUnidade"><option value="kg">R$/kg</option><option value="arroba">R$/@</option></select>
        </div>
      </div>
      <div class="campo"><label>Rendimento (%)</label><input id="iRendimento" type="number" value="50" step="0.1" min="0" max="100"></div>
      <button class="btn-start" onclick="iniciar()">✓ COMEÇAR PESAGEM</button>
    </div>
  </div>

  <!-- TELA PESAGEM -->
  <div class="t-pes off" id="tPes">

    <!-- PARTE FIXA: display + qtd + confirmação + teclado -->
    <div class="pes-top">
      <div class="display">
        <span class="dval" id="dval">0</span>
        <span class="dunit">kg</span>
      </div>
      <div class="qtd-row">
        <label>Bois:</label>
        <div class="qtd-wrap">
          <div class="qtd-ind"></div>
          <div class="qtd-track" id="qtdTrack"></div>
        </div>
        <input type="hidden" id="iQtd" value="1">
      </div>
      <div id="confBox" class="conf-box"></div>
      <div class="teclado">
        <button class="key" onclick="dig('7')">7</button>
        <button class="key" onclick="dig('8')">8</button>
        <button class="key" onclick="dig('9')">9</button>
        <button class="key del" onclick="apagar()">⌫</button>

        <button class="key" onclick="dig('4')">4</button>
        <button class="key" onclick="dig('5')">5</button>
        <button class="key" onclick="dig('6')">6</button>
        <button class="key clr" onclick="limpar()">CLR</button>

        <button class="key" onclick="dig('1')">1</button>
        <button class="key" onclick="dig('2')">2</button>
        <button class="key" onclick="dig('3')">3</button>
        <button class="key" onclick="dig('.')">.</button>

        <button class="key ok" onclick="salvar()">✓</button>
        <button class="key" onclick="dig('0')">0</button>
        <button class="key" onclick="dig('0')">00</button>
        <button class="key prox" onclick="proximo()">OK</button>
      </div>
    </div>

    <!-- PARTE SCROLLÁVEL: tabela + botões -->
    <div class="pes-scroll">

      <!-- TABELA PLANILHA -->
      <div class="tabela-wrap" id="tabelaWrap">
        <div class="tab-header">
          <span>#</span><span>Qtd</span><span>Peso kg</span><span>Média/@</span><span>Valor R$</span><span></span>
        </div>
        <div id="tabelaBody">
          <div class="tab-empty">Nenhuma pesagem ainda</div>
        </div>
      </div>

      <!-- CARD RESUMO DO LOTE -->
      <div class="resumo-card" id="resumoCard" style="display:none">
        <div class="resumo-titulo">📊 RESUMO DO LOTE</div>
        <div class="resumo-grid">
          <div class="resumo-item">
            <div class="resumo-label">Total de Bois</div>
            <div class="resumo-val" id="rBois">—</div>
          </div>
          <div class="resumo-item">
            <div class="resumo-label">Peso Total</div>
            <div class="resumo-val" id="rPeso">—</div>
          </div>
          <div class="resumo-item">
            <div class="resumo-label">Média de @</div>
            <div class="resumo-val" id="rArr">—</div>
          </div>
          <div class="resumo-item">
            <div class="resumo-label">Média de kg/boi</div>
            <div class="resumo-val" id="rKg">—</div>
          </div>
          <div class="resumo-item resumo-full">
            <div class="resumo-label">Valor Total</div>
            <div class="resumo-val resumo-destaque" id="rValor">—</div>
          </div>
          <div class="resumo-item resumo-full" style="background:rgba(212,175,55,.12)">
            <div class="resumo-label">Base de cálculo</div>
            <div class="resumo-val" style="font-size:13px;color:#f4e4c1" id="rRend">—</div>
          </div>
        </div>
      </div>

      <!-- BOTÕES -->
      <button class="btn-exportar" onclick="exportarExcel()">📊 SALVAR PLANILHA (.xlsx)</button>
      <button class="btn-finalizar" onclick="finalizar()">✓ FINALIZAR LOTE</button>

    </div>
  </div>

</div>
<script>
// ─── Estado ───────────────────────────────────────────────────────────────────
let pesagens = [];
let peso = '';
let precoVenda = 0;
let unidade = 'kg';

// ─── Cadastro ─────────────────────────────────────────────────────────────────
function iniciar() {
  const vendedor  = document.getElementById('iVendedor').value  || 'Não informado';
  const compra    = parseFloat(document.getElementById('iCompra').value)    || 0;
  const venda     = parseFloat(document.getElementById('iVenda').value)     || 0;
  const rend      = parseFloat(document.getElementById('iRendimento').value)|| 50;
  unidade         = document.getElementById('iUnidade').value;
  precoVenda      = venda;

  window._vendedor = vendedor;
  window._compra   = compra;
  window._rend     = rend;

  document.getElementById('h-vendedor').textContent = vendedor;
  document.getElementById('h-preco').textContent =
    compra > 0 ? `Compra: R$ ${compra.toFixed(2)}` : (venda > 0 ? `Venda: R$ ${venda.toFixed(2)}/${unidade === 'arroba' ? '@' : 'kg'}` : '—');

  document.getElementById('tCad').classList.add('off');
  document.getElementById('tPes').classList.remove('off');
}

// ─── Teclado ──────────────────────────────────────────────────────────────────
function dig(v) {
  if (peso.length >= 7) return;
  if (v === '.' && peso.includes('.')) return;
  if (v === '00' && peso === '') return;
  peso += v;
  atualizar();
}
function apagar() { peso = peso.slice(0,-1); atualizar(); }
function limpar()  { peso = ''; document.getElementById('confBox').innerHTML = ''; atualizar(); }
function proximo() { limpar(); resetQtd(); }
function atualizar() { document.getElementById('dval').textContent = peso || '0'; }

// ─── Qty picker ───────────────────────────────────────────────────────────────
(function initPicker() {
  const track  = document.getElementById('qtdTrack');
  const hidden = document.getElementById('iQtd');
  const PAD = 3, MAX = 20;

  for (let i=0;i<PAD;i++) track.appendChild(Object.assign(document.createElement('div'),{className:'qtd-item'}));
  for (let i=1;i<=MAX;i++) {
    const el = Object.assign(document.createElement('div'),{className:'qtd-item'+(i===1?' sel':''),textContent:i});
    el.dataset.v = i;
    track.appendChild(el);
  }
  for (let i=0;i<PAD;i++) track.appendChild(Object.assign(document.createElement('div'),{className:'qtd-item'}));

  function snapTo(el) {
    track.querySelectorAll('.sel').forEach(e=>e.classList.remove('sel'));
    el.classList.add('sel');
    hidden.value = el.dataset.v;
    track.scrollTo({left: el.offsetLeft - track.offsetWidth/2 + el.offsetWidth/2, behavior:'smooth'});
  }

  // scroll to 1 on init (after paint)
  requestAnimationFrame(()=>{
    const first = track.querySelector('[data-v="1"]');
    if (first) snapTo(first);
  });

  let t;
  track.addEventListener('scroll', ()=>{
    clearTimeout(t);
    t = setTimeout(()=>{
      const center = track.scrollLeft + track.offsetWidth/2;
      let best=null, min=Infinity;
      track.querySelectorAll('[data-v]').forEach(el=>{
        const d = Math.abs(el.offsetLeft + el.offsetWidth/2 - center);
        if(d<min){min=d;best=el;}
      });
      if(best) snapTo(best);
    }, 80);
  });
  track.addEventListener('click', e=>{
    const el = e.target.closest('[data-v]');
    if(el) snapTo(el);
  });
})();

function resetQtd() {
  const track = document.getElementById('qtdTrack');
  const first = track.querySelector('[data-v="1"]');
  if (first) {
    track.querySelectorAll('.sel').forEach(e=>e.classList.remove('sel'));
    first.classList.add('sel');
    document.getElementById('iQtd').value = '1';
    track.scrollTo({left: first.offsetLeft - track.offsetWidth/2 + first.offsetWidth/2, behavior:'smooth'});
  }
}

// ─── Salvar pesagem ───────────────────────────────────────────────────────────
function salvar() {
  const p = parseFloat(peso);
  if (!p || p <= 0) { alert('Digite um peso válido'); return; }

  const qtd         = parseInt(document.getElementById('iQtd').value) || 1;
  const rend        = (window._rend || 50) / 100;   // ex: 50% → 0.50
  const carcaca     = p * rend;                      // kg de carcaça
  const arr         = carcaca / 15;                  // arrobas = carcaça / 15
  const mediaPorBoi = p / qtd;                       // kg vivo por boi

  let valor = 0;
  if (precoVenda > 0) {
    valor = unidade === 'arroba' ? arr * precoVenda : p * precoVenda;
  }

  const reg = {
    id:    Date.now(),
    num:   pesagens.length + 1,
    qtd,
    peso:  p,
    arr:   arr.toFixed(2),
    media: mediaPorBoi.toFixed(1),
    valor
  };
  pesagens.unshift(reg);

  document.getElementById('confBox').innerHTML =
    `<div class="conf-msg">✓ #${reg.num} salva: ${p} kg — ${qtd} boi${qtd>1?'s':''}</div>`;

  renderTabela();

  setTimeout(()=>{
    peso = '';
    atualizar();
    resetQtd();
    document.getElementById('confBox').innerHTML = '';
  }, 1200);
}

// ─── Tabela ───────────────────────────────────────────────────────────────────
function renderTabela() {
  const body = document.getElementById('tabelaBody');
  const card = document.getElementById('resumoCard');

  if (pesagens.length === 0) {
    body.innerHTML = '<div class="tab-empty">Nenhuma pesagem ainda</div>';
    card.style.display = 'none';
    return;
  }

  // Linhas da tabela (mais recente primeiro)
  body.innerHTML = pesagens.map(r => `
    <div class="tab-row">
      <span class="n">${r.num}</span>
      <span>${r.qtd}</span>
      <span>${r.peso}</span>
      <span>${r.arr}@</span>
      <span>${r.valor > 0 ? 'R$'+r.valor.toFixed(0) : '—'}</span>
      <button class="del-btn" onclick="excluir(${r.id})">❌</button>
    </div>`).join('');

  // Cálculos
  const totBois  = pesagens.reduce((s,r) => s + r.qtd,  0);
  const totPeso  = pesagens.reduce((s,r) => s + r.peso, 0);
  const rend     = (window._rend || 50) / 100;
  const totArr   = (totPeso * rend) / 15;     // arrobas totais com rendimento
  const mediaArr = totArr / totBois;           // média de @ por boi
  const mediaKg  = totPeso / totBois;          // média de kg vivo por boi
  const totValor = pesagens.reduce((s,r) => s + r.valor, 0);

  document.getElementById('rBois').textContent  = totBois + ' bois';
  document.getElementById('rPeso').textContent  = totPeso.toFixed(0) + ' kg';
  document.getElementById('rArr').textContent   = mediaArr.toFixed(2) + ' @/boi';
  document.getElementById('rKg').textContent    = mediaKg.toFixed(1) + ' kg/boi';
  document.getElementById('rValor').textContent = totValor > 0 ? 'R$ ' + totValor.toLocaleString('pt-BR', {minimumFractionDigits:2}) : '—';
  document.getElementById('rRend').textContent  = (window._rend || 50) + '% rendimento';

  card.style.display = 'block';
}

function excluir(id) {
  pesagens = pesagens.filter(r=>r.id!==id).map((r,i)=>({...r,num:i+1}));
  renderTabela();
}

// ─── Exportar Excel ───────────────────────────────────────────────────────────
function exportarExcel() {
  if (pesagens.length === 0) { alert('Nenhuma pesagem para exportar!'); return; }

  const totQtd  = pesagens.reduce((s,r)=>s+r.qtd,0);
  const totPeso = pesagens.reduce((s,r)=>s+r.peso,0);
  const totVal  = pesagens.reduce((s,r)=>s+r.valor,0);
  const rend    = (window._rend || 50) / 100;
  const totArr  = (totPeso * rend) / 15;

  // Cabeçalho do lote
  const info = [
    ['RELATÓRIO DE PESAGEM DE GADO'],
    ['Data:', new Date().toLocaleString('pt-BR')],
    ['Vendedor:', window._vendedor || '—'],
    ['Preço Compra (total lote):', window._compra > 0 ? `R$ ${window._compra.toFixed(2)}` : '—'],
    ['Preço Venda:', precoVenda > 0 ? `R$ ${precoVenda.toFixed(2)}/${unidade==='arroba'?'@':'kg'}` : '—'],
    ['Rendimento (%):', window._rend || '—'],
    [],
    ['#', 'Qtd Bois', 'Peso (kg)', unidade==='arroba'?'Arrobas (@)':'Média kg/boi', 'Valor (R$)']
  ];

  // Linhas de pesagem (ordem original = mais antiga primeiro)
  const linhas = [...pesagens].reverse().map(r => [
    r.num,
    r.qtd,
    r.peso,
    parseFloat(unidade==='arroba' ? r.arr : r.media),
    r.valor > 0 ? r.valor : ''
  ]);

  // Linha de totais
  linhas.push([]);
  linhas.push(['TOTAL', totQtd, totPeso.toFixed(1), totArr.toFixed(2), totVal>0 ? totVal.toFixed(2) : '']);

  if (window._compra > 0 && totVal > 0) {
    const lucro = totVal - window._compra;
    linhas.push([]);
    linhas.push(['Lucro / Prejuízo (R$)', '', '', '', lucro.toFixed(2)]);
  }

  const dados = [...info, ...linhas];
  const ws = XLSX.utils.aoa_to_sheet(dados);

  // Larguras de coluna
  ws['!cols'] = [{wch:6},{wch:10},{wch:12},{wch:14},{wch:14}];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Pesagem');

  const data = new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb, `Pesagem_${window._vendedor||'Lote'}_${data}.xlsx`);
}

// ─── Finalizar ────────────────────────────────────────────────────────────────
function finalizar() {
  if (pesagens.length === 0) { alert('Nenhuma pesagem registrada!'); return; }

  // Exporta Excel automaticamente ao finalizar
  exportarExcel();

  if (confirm('Planilha salva! Deseja começar um novo lote?')) {
    location.reload();
  }
}

// ─── SW ───────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', ()=> navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
</script>
</body>
